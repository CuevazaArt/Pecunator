name: Secret Scan

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - 'refactor/**'
    paths-ignore:
      - 'runtime/data/**'
      - '*.sqlite'
  pull_request:
    branches:
      - main
      - develop

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

