name: "CI Gate — Required for merge to main"

# This workflow is the SINGLE required status check for branch protection.
# It runs both Python and Flutter checks in one workflow so GitHub can
# enforce "ci-gate must pass" as a merge requirement.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python-lint:
    name: "Python Lint & Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint (errors only)
        run: ruff check runtime/ --select=E,W,F --max-line-length=120

      - name: Pytest (core modules)
        run: |
          pytest runtime/tests/ -v --tb=short -x

  flutter-analyze:
    name: "Flutter Analyze"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Analyze
        working-directory: desktop_shell
        run: |
          flutter pub get
          flutter analyze lib/

  gate:
    name: "CI Gate"
    needs: [python-lint, flutter-analyze]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.python-lint.result }}" != "success" ]; then
            echo "❌ Python lint/tests failed"
            exit 1
          fi
          if [ "${{ needs.flutter-analyze.result }}" != "success" ]; then
            echo "❌ Flutter analyze failed"
            exit 1
          fi
          echo "✅ All CI checks passed — merge allowed"
